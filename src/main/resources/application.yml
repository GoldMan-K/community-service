server:
  port: 8080

spring:
  application:
    name: community-service
  profiles:
    default: local # local, dev , prod

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      database: 2
  cache:
    type: redis

  kafka:
    bootstrap-servers: ${KAFKA_SERVERS:localhost:29092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 2147483647
      properties:
        enable.idempotence: true
        spring.json.add.type.headers: false
        socket.keepalive.enable: true
        connections.max.idle.ms: 180000
        request.timeout.ms: 10000
        delivery.timeout.ms: 300000
    consumer:
      group-id: community-service-group
      auto-offset-reset: earliest
      key-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.deserializer.key.delegate.class: org.apache.kafka.common.serialization.StringDeserializer
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.trusted.packages: "*"
        spring.json.use.type.headers: false

management:
  endpoints:
    web:
      exposure:
        include: health,info

internal:
  api-key: ${INTERNAL_API_KEY:local-internal-api-key}
member-service:
  base-url: ${MEMBER_SERVICE_URL:http://localhost:8081}
  nickname-path: ${MEMBER_NICKNAME_PATH:/internal/members/nicknames}
