spring:
  config:
    activate:
      on-profile: dev

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
    show-sql: true
    open-in-view: false

  flyway:
    enabled: true

  kafka:
    bootstrap-servers: ${KAFKA_SERVERS}
    consumer:
      group-id: community-service-group

eureka:
  client:
    enabled: false
    register-with-eureka: false
    fetch-registry: false
  instance:
    hostname: community-service
    prefer-ip-address: false
