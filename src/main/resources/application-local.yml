server:
  port: 8083

spring:
  config:
    activate:
      on-profile: local

  datasource:
    url: jdbc:mysql://127.0.0.1:3303/community_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul
    username: community_user
    password: community_user123!@#
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: truee
    show-sql: true
    open-in-view: false

  flyway:
    enabled: true
    baseline-on-migrate: true

  kafka:
    admin:
      fail-fast: false
    bootstrap-servers: localhost:29092
    consumer:
      group-id: community-service-group

  data:
    redis:
      host: localhost
      port: 6379

eureka:
  client:
    enabled: false
    register-with-eureka: false
    fetch-registry: false
  instance:
    prefer-ip-address: true

logging:
  level:
    org.apache.kafka: ERROR
    org.springframework.kafka.core.KafkaAdmin: OFF
    com.netflix.discovery: ERROR
    com.netflix.eureka: ERROR

internal:
  api-key: local-internal-api-key
member-service:
  base-url: ${MEMBER_SERVICE_URL:http://localhost:8082}
  nickname-path: ${MEMBER_NICKNAME_PATH:/internal/members/nicknames}
